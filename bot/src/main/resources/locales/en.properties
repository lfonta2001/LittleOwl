### ERRORS
error.command_could_not_execute=This command could not be executed, contact the guild owner or bot owner.
error.command_on_cooldown=This command is on cooldown. Try again in <TIME> seconds.
error.command_on_cooldown.default.TIME=not specified, check manually
error.guild_only=This command can only be used in a guild.
error.missing_permissions=You don't have permission to use this command.
error.unable_to_execute_command=An error occurred while executing the command.
error.unknown_command=Unknown command.
error.unknown_error=An unknown error occurred.
error.middleware_warnings_exceeded=Too many middleware warnings occurred while executing this command.

### MESSAGES

message.user_banned_from_bot=Your account has been banned from using the bot.

message.user_banned_from_guild=You have been banned from the guild <GUILD_NAME>. Reason: <REASON>
message.user_banned_from_guild.default.GUILD_NAME=not specified, check manually
message.user_banned_from_guild.default.REASON=No reason specified.
